<script>
const BRAND_COLORS = {
  '미쉐린':'#FFD700','콘티넨탈':'#F27B20','피렐리':'#CC0000',
  '한국타이어':'#003087','금호':'#00843D','굿이어':'#0057A0','라우펜':'#E5004B','제너럴':'#D4451A'
};

const DATA_VERSION = 'v2026-04-17b';
let data = [...DEFAULT_DATA];
let activeBrand = '전체';
let activeSort = 'size';
let editIdx = -1;
let isAdmin = false;

function loadData() {
  const savedVer = localStorage.getItem('tireDataVersion');
  if (savedVer !== DATA_VERSION) {
    localStorage.removeItem('tireData');
    localStorage.setItem('tireDataVersion', DATA_VERSION);
  }
  const saved = localStorage.getItem('tireData');
  data = saved ? JSON.parse(saved) : [...DEFAULT_DATA];
}
function saveData() { localStorage.setItem('tireData', JSON.stringify(data)); }

function inlineCalc(base, cid) {
  const rate = parseFloat(document.getElementById('dc'+cid).value) || 0;
  const qty = parseInt(document.getElementById('qty'+cid).value) || 1;
  const each = Math.round(base * (1 - rate / 100));
  const total = each * qty;
  const el = document.getElementById('res'+cid);
  el.textContent = qty > 1 ? `₩${total.toLocaleString()} (${qty})` : `₩${total.toLocaleString()}`;
}
function chgQty(cid, d, base) {
  const el = document.getElementById('qty'+cid);
  let v = parseInt(el.value) + d;
  if (v < 1) v = 1; if (v > 99) v = 99;
  el.value = v;
  inlineCalc(base, cid);
}

function init() {
  loadData();
  renderBrands();
  render();
  document.getElementById('searchInput').addEventListener('input', render);
}

function renderBrands() {
  const el = document.getElementById('brandFilters');
  const brands = ['전체','미쉐린','콘티넨탈','제너럴','굿이어','피렐리','한국타이어','라우펜','금호'];
  el.innerHTML = brands.map(b =>
    `<button class="brand-btn ${b===activeBrand?'active':''}" data-brand="${b}" onclick="filterBrand('${b}')">${b}</button>`
  ).join('');
}

function filterBrand(b) {
  activeBrand = b;
  renderBrands();
  render();
}

function setSort(s) {
  activeSort = s;
  document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.sort === s));
  render();
}

function render() {
  const raw = document.getElementById('searchInput').value.trim();
  if (!raw && activeBrand === '전체') {
    document.getElementById('stats').textContent = `총 ${data.length}개 타이어`;
    document.getElementById('results').innerHTML = '<p style="text-align:center;color:#999;padding:60px 20px;font-size:0.95rem;">🔍 사이즈를 검색하거나 브랜드를 선택하세요<br><span style="font-size:0.8rem;color:#bbb;">예: 225/45R17</span></p>';
    return;
  }
  const q = raw.toUpperCase().replace(/\s/g,'');
  const qNums = raw.replace(/[^0-9]/g,'');
  let filtered = data.filter(item => {
    if (activeBrand !== '전체' && item.brand !== activeBrand) return false;
    if (q) {
      const sizeNorm = item.size.toUpperCase().replace(/\s/g,'');
      const sizeNums = item.size.replace(/[^0-9]/g,'');
      const patNorm = item.pattern.toUpperCase();
      if (!sizeNorm.includes(q) && !patNorm.includes(q) && !(qNums && sizeNums.includes(qNums))) return false;
    }
    return true;
  });
  const BRAND_ORDER = {'미쉐린':0,'콘티넨탈':1,'한국타이어':2,'금호':3,'라우펜':4,'굿이어':5,'피렐리':6,'제너럴':7};
  const brandRank = (b) => BRAND_ORDER[b] !== undefined ? BRAND_ORDER[b] : 99;
  if (activeSort === 'priceAsc') filtered.sort((a,b) => a.price - b.price);
  else if (activeSort === 'priceDesc') filtered.sort((a,b) => b.price - a.price);
  else filtered.sort((a,b) => brandRank(a.brand) - brandRank(b.brand) || a.size.localeCompare(b.size));
  document.getElementById('stats').textContent = `검색 결과: ${filtered.length}개`;
  const html = filtered.map((item, i) => {
    const realIdx = data.indexOf(item);
    const color = BRAND_COLORS[item.brand] || '#333';
    const textColor = item.brand === '미쉐린' ? '#333' : '#fff';
    const cid = `c${realIdx}`;
    return `<div class="tire-card">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="brand-tag" style="background:${color};color:${textColor}">${item.brand}</div>
        <div class="tire-info">
          <div class="tire-pattern">${item.pattern}</div>
          <div class="tire-size">${item.size}${item.oem ? " <span style=\"color:#999;font-size:0.75rem\">"+item.oem+"</span>" : ""}</div>
        </div>
        <div class="tire-price"><span style="font-size:0.7rem;color:#888;font-weight:400;">공장도가</span><br>₩${item.price.toLocaleString()}</div>
        ${isAdmin ? `<button class="edit-btn" onclick="showEditModal(${realIdx})">✏️</button>` : ''}
      </div>
      <div class="tire-calc">
        <span>DC</span><input type="number" id="dc${cid}" value="0" min="0" max="100" oninput="inlineCalc(${item.price},'${cid}')"><span>%</span>
        <button class="qty-btn" onclick="chgQty('${cid}',-1,${item.price})">−</button>
        <input type="number" id="qty${cid}" value="1" min="1" max="99" oninput="inlineCalc(${item.price},'${cid}')">
        <button class="qty-btn" onclick="chgQty('${cid}',1,${item.price})">+</button>
        <span>개</span>
        <div class="calc-result" id="res${cid}">₩${item.price.toLocaleString()}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('results').innerHTML = html || '<p style="text-align:center;color:#999;padding:40px;">검색 결과가 없습니다</p>';
}

function toggleAdmin() {
  if (isAdmin) { isAdmin = false; updateAdminUI(); render(); return; }
  document.getElementById('pwModal').classList.add('show');
  document.getElementById('pwInput').value = '';
  setTimeout(() => document.getElementById('pwInput').focus(), 200);
}
function checkPw() {
  if (document.getElementById('pwInput').value === '12345') {
    isAdmin = true;
    document.getElementById('pwModal').classList.remove('show');
    updateAdminUI();
    render();
  } else { alert('비밀번호가 틀립니다'); }
}
function updateAdminUI() {
  const btn = document.getElementById('adminToggle');
  btn.textContent = isAdmin ? '🔓 관리자 ON' : '🔒 관리자';
  btn.dataset.admin = isAdmin;
  document.getElementById('addSection').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('csvSection').style.display = isAdmin ? 'block' : 'none';
}
function showEditModal(idx) {
  editIdx = idx;
  const item = data[idx];
  document.getElementById('editBrand').value = item.brand;
  document.getElementById('editPattern').value = item.pattern;
  document.getElementById('editSize').value = item.size;
  document.getElementById('editPrice').value = item.price;
  document.getElementById('editModal').classList.add('show');
}
function saveEdit() {
  data[editIdx].brand = document.getElementById('editBrand').value;
  data[editIdx].pattern = document.getElementById('editPattern').value;
  data[editIdx].size = document.getElementById('editSize').value;
  data[editIdx].price = parseInt(document.getElementById('editPrice').value);
  saveData();
  document.getElementById('editModal').classList.remove('show');
  render();
}
function deleteItem() {
  if (confirm('삭제하시겠습니까?')) {
    data.splice(editIdx, 1);
    saveData();
    document.getElementById('editModal').classList.remove('show');
    render();
  }
}
function addItem() {
  const brand = document.getElementById('addBrand').value;
  const pattern = document.getElementById('addPattern').value.trim();
  const size = document.getElementById('addSize').value.trim();
  const price = parseInt(document.getElementById('addPrice').value);
  if (!pattern || !size || !price) { alert('모든 항목을 입력하세요'); return; }
  data.push({ brand, pattern, size, price });
  saveData();
  render();
  document.getElementById('addPattern').value = '';
  document.getElementById('addSize').value = '';
  document.getElementById('addPrice').value = '';
}
function exportCsv() {
  const csv = '브랜드,패턴,사이즈,가격\n' + data.map(d => `${d.brand},${d.pattern},${d.size},${d.price}`).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tire_prices.csv';
  a.click();
}
function importCsv(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const lines = ev.target.result.split('\n').slice(1).filter(l => l.trim());
    lines.forEach(line => {
      const [brand, pattern, size, price] = line.split(',');
      if (brand && pattern && size && price) {
        data.push({ brand: brand.trim(), pattern: pattern.trim(), size: size.trim(), price: parseInt(price) });
      }
    });
    saveData();
    render();
    alert(`${lines.length}개 항목 가져오기 완료`);
  };
  reader.readAsText(file);
}
function resetData() {
  if (confirm('기본 데이터로 초기화하시겠습니까?')) {
    localStorage.removeItem('tireData');
    data = [...DEFAULT_DATA];
    render();
  }
}

window.onload = init;

</script>
